<section class="card">
  <b>Formulario</b>
  <p class="muted" style="margin-top:0;">
    Envíanos un mensaje y con gusto te contactaremos para revisar tu proyecto.
  </p>

  <form
    id="contact-form"
    action="https://formspree.io/f/xqeyenal"
    method="POST"
  >
    <div class="formGrid">
      <input required name="nombre" placeholder="Nombre" />
      <input required name="empresa" placeholder="Empresa" />
      <input required type="email" name="email" placeholder="Correo electrónico" />
      <input name="telefono" placeholder="Teléfono (opcional)" />
    </div>

    <div style="margin-top:10px;">
      <textarea
        required
        rows="6"
        name="mensaje"
        placeholder="Describe tu proyecto (alcance, capacidad, restricciones, tiempos y ubicación)"
      ></textarea>
    </div>

    <input type="hidden" name="_subject" value="Nuevo contacto desde vectoreng.com.mx" />

    <div class="actions" style="margin-top:10px;">
      <button id="submitButton" class="btn primary" type="submit" style="cursor:pointer">
        Enviar
      </button>
    </div>
  </form>
</section>
