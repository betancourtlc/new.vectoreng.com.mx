<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vector Engineering</title>
  <meta name="description" content="Vector Engineering: Automatización industrial y pirólisis/procesos circulares. Diseño, integración y puesta en marcha." />

  <style>
    :root{
      --bg: #070b14;
      --text: #ffffff;
      --muted: rgba(255,255,255,.80);
      --line: rgba(255,255,255,.18);
      --glass: rgba(255,255,255,.10);
      --glass2: rgba(255,255,255,.08);
      --shadow: 0 18px 60px rgba(0,0,0,.45);

      /* Rojo Vector (acento) */
      --accent: #b91c1c;
      --accentSoft: rgba(185,28,28,.18);
      --accentLine: rgba(185,28,28,.42);

      --radius: 18px;
      --max: 1120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color: var(--text);
      background: var(--bg);
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}

    /* Background image + overlays */
    .bg{
      position:fixed;
      inset:0;
      z-index:-2;
      background:url("/assets/hero.webp?v=20") center/cover no-repeat;
      filter:saturate(.95) contrast(1.03);
      transform:scale(1.02);
    }
    .bg::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(1100px 650px at 18% 45%, rgba(0,190,255,.18), transparent 60%),
        radial-gradient(1100px 650px at 82% 45%, rgba(16,185,129,.16), transparent 60%),
        radial-gradient(800px 520px at 50% 30%, rgba(185,28,28,.18), transparent 62%),
        linear-gradient(90deg, rgba(7,11,20,.86) 0%, rgba(7,11,20,.68) 45%, rgba(7,11,20,.84) 100%);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.38) 100%);
      opacity:.9;
      mix-blend-mode:multiply;
    }

    /* Fullscreen layout */
    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding: 34px 18px 34px;
      gap: 18px;
    }
    .container{
      width:100%;
      max-width:var(--max);
      position:relative;
    }

    /* Top brand area (keeps only brand; no big text) */
    .top{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap: 10px;
      padding-top: 10px;
    }
    .logoPlate{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: var(--shadow);
      width: fit-content;
    }
    .logoPlate img{
      height: 54px;
      width:auto;
      display:block;
    }
    .kicker{
      display:inline-flex;
      width:fit-content;
      gap:10px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.88);
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .25px;
      backdrop-filter: blur(12px);
    }

    /* Horizontal nav buttons (centered, lower on page) */
    .navZone{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top: clamp(140px, 22vh, 260px); /* “un poco hacia abajo” */
    }
    .navBar{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap: 12px;
      padding: 14px;
      border-radius: calc(var(--radius) + 10px);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.95);
      font-weight: 950;
      letter-spacing: .1px;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      white-space:nowrap;
      min-width: 210px; /* hace que se vean “equilibrados” */
      justify-content:center;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.11);
      border-color: rgba(255,255,255,.28);
    }
    .btn span{
      opacity:.92;
      font-weight: 950;
    }
    .btn .arrow{
      opacity:.9;
      font-size: 14px;
    }

    /* Accent (Automatización como botón primario) */
    .btn.primary{
      border-color: var(--accentLine);
      background: linear-gradient(180deg, var(--accentSoft), rgba(255,255,255,.07));
    }
    .btn.primary:hover{
      border-color: rgba(185,28,28,.60);
      background: linear-gradient(180deg, rgba(185,28,28,.22), rgba(255,255,255,.08));
    }

    /* Small footer line */
    .mini{
      margin-top: auto;
      padding-top: 18px;
      width:100%;
      max-width:var(--max);
      display:flex;
      justify-content:flex-start;
      color: rgba(255,255,255,.62);
      font-weight: 750;
      font-size: 12px;
    }

    /* Responsive */
    @media (max-width: 980px){
      .logoPlate img{height:48px}
      .btn{min-width: 190px}
      .navZone{margin-top: clamp(120px, 18vh, 220px);}
    }
    @media (max-width: 560px){
      .btn{min-width: 100%;} /* en móvil, se apilan y ocupan todo */
      .navBar{width:100%}
      .mini{justify-content:center}
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="wrap">
    <div class="container">
      <!-- Marca (sin el bloque de texto grande) -->
      <div class="top">
        <div class="logoPlate">
          <img src="/assets/logo.png" alt="Vector Engineering" />
        </div>
        <div class="kicker">Automatización Industrial • Pirólisis • Procesos Circulares</div>
      </div>

      <!-- Botonera horizontal centrada más abajo -->
      <div class="navZone">
        <nav class="navBar" aria-label="Navegación principal">
          <a class="btn primary" href="/automation.html"><span>Automatización</span> <span class="arrow">↗</span></a>
          <a class="btn" href="/pyrolysis.html"><span>Pirólisis &amp; Procesos Circulares</span> <span class="arrow">↗</span></a>
          <a class="btn" href="/projects.html"><span>Proyectos</span> <span class="arrow">↗</span></a>
          <a class="btn" href="/contact.html"><span>Contacto</span> <span class="arrow">↗</span></a>
        </nav>
      </div>
    </div>

    <div class="mini">Aguascalientes, México • vectoreng.com.mx</div>
  </main>
</body>
</html>
