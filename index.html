<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vector Engineering</title>
  <meta name="description" content="Vector Engineering: Automatización industrial y pirólisis/procesos circulares. Diseño, integración y puesta en marcha." />

  <style>
    :root{
      --bg: #070b14;
      --text: #ffffff;
      --muted: rgba(255,255,255,.80);
      --line: rgba(255,255,255,.18);
      --glass: rgba(255,255,255,.10);
      --glass2: rgba(255,255,255,.08);
      --shadow: 0 18px 60px rgba(0,0,0,.45);

      /* Rojo Vector (acento) */
      --accent: #b91c1c;
      --accentSoft: rgba(185,28,28,.18);
      --accentLine: rgba(185,28,28,.42);

      --radius: 18px;
      --max: 1120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color: var(--text);
      background: var(--bg);
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}

    /* Background image + overlays */
    .bg{
      position:fixed;
      inset:0;
      z-index:-2;
      background:url("/assets/hero.webp?v=30") center/cover no-repeat;
      filter:saturate(1.12) contrast(1.10) brightness(1.02);
      transform:scale(1.02);
      will-change: transform;
    }
    .bg::before{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(1100px 650px at 18% 45%, rgba(0,190,255,.18), transparent 60%),
        radial-gradient(1100px 650px at 82% 45%, rgba(16,185,129,.16), transparent 60%),
        radial-gradient(800px 520px at 50% 30%, rgba(185,28,28,.18), transparent 62%),
        linear-gradient(90deg, rgba(7,11,20,.66) 0%, rgba(7,11,20,.46) 45%, rgba(7,11,20,.64) 100%);
    }
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at center, transparent 56%, rgba(0,0,0,.22) 100%);
      opacity:.60;
      mix-blend-mode:multiply;
    }

    /* Fullscreen layout */
    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding: 34px 18px 34px;
      gap: 18px;
    }
    .container{
      width:100%;
      max-width:var(--max);
      position:relative;
    }

    /* Top brand area */
    .top{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap: 10px;
      padding-top: 10px;
    }
    .logoPlate{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 14px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: var(--shadow);
      width: fit-content;
    }
    .logoPlate img{
      height: 54px;
      width:auto;
      display:block;
    }
    .kicker{
      display:inline-flex;
      width:fit-content;
      gap:10px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.88);
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .25px;
      backdrop-filter: blur(12px);
    }

    /* Horizontal nav buttons (centered, lower on page) */
    .navZone{
  width:100%;
  display:flex;
  justify-content:center;
  margin-top: clamp(280px, 42vh, 520px); /* más abajo */
}
    .navBar{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap: 12px;
      padding: 14px;
      border-radius: calc(var(--radius) + 10px);
      background: rgba(255,255,255,.085);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .btn{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.085);
      color: rgba(255,255,255,.96);
      font-weight: 950;
      letter-spacing: .1px;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease;
      white-space:nowrap;
      min-width: 210px;
      justify-content:center;
      text-shadow: 0 1px 10px rgba(0,0,0,.30);
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.30);
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .btn .arrow{
      opacity:.9;
      font-size: 14px;
    }

    .btn.primary{
      border-color: var(--accentLine);
      background: linear-gradient(180deg, var(--accentSoft), rgba(255,255,255,.08));
    }
    .btn.primary:hover{
      border-color: rgba(185,28,28,.62);
      background: linear-gradient(180deg, rgba(185,28,28,.24), rgba(255,255,255,.10));
    }

    /* Small footer line */
    .mini{
      margin-top: auto;
      padding-top: 18px;
      width:100%;
      max-width:var(--max);
      display:flex;
      justify-content:flex-start;
      color: rgba(255,255,255,.62);
      font-weight: 750;
      font-size: 12px;
    }

    /* Responsive */
    @media (max-width: 980px){
      .logoPlate img{height:48px}
      .btn{min-width: 190px}
      .navZone{margin-top: clamp(240px, 36vh, 460px);}
    }
    @media (max-width: 560px){
      .btn{min-width: 100%;}
      .navBar{width:100%}
      .mini{justify-content:center}
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true" id="bg"></div>

  <main class="wrap">
    <div class="container">
      <!-- Marca -->
      <div class="top">
        <div class="logoPlate">
          <img src="/assets/logo.png" alt="Vector Engineering" />
        </div>
        <div class="kicker">Automatización Industrial • Pirólisis • Procesos Circulares</div>
      </div>

      <!-- Botonera horizontal centrada más abajo -->
      <div class="navZone">
        <nav class="navBar" aria-label="Navegación principal">
          <a class="btn primary" href="/automation.html">Automatización <span class="arrow">↗</span></a>
          <a class="btn" href="/pyrolysis.html">Pirólisis &amp; Procesos Circulares <span class="arrow">↗</span></a>
          <a class="btn" href="/projects.html">Proyectos <span class="arrow">↗</span></a>
          <a class="btn" href="/contact.html">Contacto <span class="arrow">↗</span></a>
        </nav>
      </div>
    </div>

    <div class="mini">Aguascalientes, México • vectoreng.com.mx</div>
  </main>

  <!-- Parallax sutil del background -->
  <script>
    (function () {
      const bg = document.getElementById('bg');
      if (!bg) return;

      // Respeta "reducir movimiento" del sistema
      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) return;

      let ticking = false;

      function onScroll() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const y = window.scrollY || 0;
          // Parallax muy sutil (1.5% del scroll)
          bg.style.transform = 'scale(1.02) translate3d(0,' + (y * 0.015) + 'px,0)';
          ticking = false;
        });
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
